services:
  agora-db:
    image: postgres:16-alpine
    container_name: agora_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: agora
    ports:
      - "5432:5432"
    volumes:
      - agora_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  agora_pgdata:
