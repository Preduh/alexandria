services:
  agora-db:
    image: postgres:16-alpine
    container_name: agora_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password_here}
      POSTGRES_DB: ${POSTGRES_DB:-agora}
    ports:
      - "5432:5432"
    volumes:
      - agora_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  agora_pgdata:
