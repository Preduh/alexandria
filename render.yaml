services:
  - type: web
    name: alexandria-agora-backend
    runtime: node
    plan: free
    rootDir: ./agora/backend
    buildCommand: pnpm install && pnpm prisma generate && pnpm tsc
    startCommand: pnpm prisma db push && pnpm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alexandria-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8000

databases:
  - name: alexandria-db
    plan: free
