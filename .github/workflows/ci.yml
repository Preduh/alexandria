name: Alexandria Agora CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build-and-test:
    name: Backend Quality Pipeline
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: agora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./agora/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # Versão estável do pnpm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: './agora/backend/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint check
        run: pnpm lint

      - name: Security audit
        run: pnpm test:security

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Setup Database Schema
        run: pnpm prisma db push
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/agora_test?schema=public

      - name: Run Tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/agora_test?schema=public
          JWT_SECRET: agora_ci_secret_test

      - name: Build Application
        run: pnpm build
